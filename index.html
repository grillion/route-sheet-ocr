<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Route Sheet Scanner</title>
<style>
  body { font-family: -apple-system, Roboto, sans-serif; margin: 0; padding: 12px; background: #111; color: #eee; }
  h1 { font-size: 1.2em; }
  video, canvas { width: 100%; max-height: 50vh; object-fit: contain; border-radius: 8px; background: #000; }
  button { font-size: 1em; padding: 10px 16px; margin: 6px 6px 6px 0; border-radius: 6px; border: none; background: #2a7; color: #fff; }
  button:disabled { background: #555; }
  #status { margin: 8px 0; min-height: 1.2em; color: #9cf; }
  fieldset { border: 1px solid #444; border-radius: 6px; margin: 10px 0; padding: 8px; }
  legend { color: #9cf; font-size: 0.9em; }
  label.field { display: block; margin: 8px 0; }
  label.field span { display: block; font-size: 0.85em; color: #aaa; margin-bottom: 2px; }
  input[type=text], textarea, select { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 6px; border: 1px solid #555; background: #222; color: #eee; font-size: 1em; }
  .choice { display: inline-block; margin: 4px 10px 4px 0; }
  #reviewForm { display: none; }
  #formLink { display: none; background: #27a; color: #fff; text-decoration: none; padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; }
  .warn { color: #fc6; font-size: 0.85em; }
</style>
</head>
<body>
<div id="app">
  <h1>Route Sheet Scanner</h1>

  <video id="cam" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="controls">
    <button id="startCam">Start Camera</button>
    <button id="capture" disabled>Capture &amp; Scan</button>
    <button id="uploadBtn">Upload Photo</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;">
  </div>
  <div id="status"></div>
  <button id="debugBtn" style="background:#555;font-size:0.85em;padding:6px 12px;">Show Debug Console</button>

  <form id="reviewForm">
    <h2 style="font-size:1em;">Review &amp; correct before opening the form</h2>

    <label class="field"><span>Customer Name</span>
      <input type="text" id="f_name">
    </label>

    <label class="field"><span>RO #</span>
      <input type="text" id="f_ro">
    </label>

    <label class="field"><span>Advisor #</span>
      <select id="f_advisor">
        <option value="">-- select --</option>
        <option value="142399">142399</option>
        <option value="17824">17824</option>
        <option value="159720">159720</option>
        <option value="160629">160629</option>
        <option value="159462">159462</option>
      </select>
    </label>

    <label class="field"><span>Tag #</span>
      <input type="text" id="f_tag">
    </label>

    <fieldset>
      <legend>Customer Status <span class="warn">(not on the RO &mdash; pick manually)</span></legend>
      <label class="choice"><input type="radio" name="status" value="WAIT"> WAIT</label>
      <label class="choice"><input type="radio" name="status" value="DROP"> DROP</label>
      <label class="choice"><input type="radio" name="status" value="DROP WITH LOANER"> DROP WITH LOANER</label>
    </fieldset>

    <fieldset>
      <legend>Express or Main Shop <span class="warn">(not on the RO &mdash; pick manually)</span></legend>
      <label class="choice"><input type="radio" name="shop" value="EXPRESS"> EXPRESS</label>
      <label class="choice"><input type="radio" name="shop" value="MAIN SHOP"> MAIN SHOP</label>
      <label class="choice"><input type="radio" name="shop" value="BOTH"> BOTH</label>
    </fieldset>

    <fieldset>
      <legend>Type of Work <span class="warn">(auto-suggested from job lines &mdash; verify)</span></legend>
      <label class="choice"><input type="checkbox" name="type" value="ENGINE"> ENGINE</label>
      <label class="choice"><input type="checkbox" name="type" value="TRANSMISSION"> TRANSMISSION</label>
      <label class="choice"><input type="checkbox" name="type" value="BODY"> BODY</label>
      <label class="choice"><input type="checkbox" name="type" value="BRAKES"> BRAKES</label>
      <label class="choice"><input type="checkbox" name="type" value="ELECTRICAL"> ELECTRICAL</label>
      <label class="choice"><input type="checkbox" name="type" value="SUSPENSION"> SUSPENSION</label>
      <label class="choice"><input type="checkbox" name="type" value="NOISE"> NOISE</label>
      <label class="choice"><input type="checkbox" name="type" value="HEATING / AIR CONDITIONING"> HEATING / AIR CONDITIONING</label>
      <label class="choice"><input type="checkbox" name="type" value="MAINTENANCE"> MAINTENANCE</label>
      <label class="choice"><input type="checkbox" name="type" value="RECALL"> RECALL</label>
      <label class="choice"><input type="checkbox" name="type" value="NYSI"> NYSI</label>
      <label class="choice"><input type="checkbox" name="type" value="LEASE RETURN"> LEASE RETURN</label>
      <label class="choice"><input type="checkbox" name="type" value="USED CAR"> USED CAR</label>
      <label class="choice"><input type="checkbox" name="type" value="PDI"> PDI</label>
      <label class="choice"><input type="checkbox" name="type" value="TIRES"> TIRES</label>
    </fieldset>

    <label class="field"><span>Notes</span>
      <textarea id="f_notes" rows="4"></textarea>
    </label>

    <button type="button" id="genLink">Build Pre-filled Link</button>
    <a id="formLink" href="#" target="_blank" rel="noopener"></a>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// On-screen console for phones (no desktop browser / tethering needed).
// Loaded on demand so it doesn't run unless you ask for it.
document.getElementById('debugBtn').onclick = function () {
  const btn = this;
  if (window.eruda) { eruda.show(); return; }
  btn.disabled = true;
  btn.textContent = "Loading console...";
  const s = document.createElement('script');
  s.src = "https://cdn.jsdelivr.net/npm/eruda@3/eruda.min.js";
  s.onload = () => {
    eruda.init();
    eruda.show();
    btn.style.display = 'none';
  };
  s.onerror = () => { btn.disabled = false; btn.textContent = "Console failed to load"; };
  document.body.appendChild(s);
};

const ADVISORS = ["142399","17824","159720","160629","159462"];

const KEYWORD_MAP = [
  [/BRAKE/i, "BRAKES"],
  [/\bTIRE/i, "TIRES"],
  [/STEER|SUSPENSION|ALIGN/i, "SUSPENSION"],
  [/MULTI ?\s?POINT|INSPECT/i, "MAINTENANCE"],
  [/SEAT ?BELT|AIRBAG|BODY/i, "BODY"],
  [/\bENGINE|\bOIL\b|FILTER/i, "ENGINE"],
  [/TRANSMISSION|\bTRANS\b/i, "TRANSMISSION"],
  [/ELECTRIC|BATTERY|WIRING/i, "ELECTRICAL"],
  [/NOISE|RATTLE|SQUEAK/i, "NOISE"],
  [/\bHEAT|A\/C|AIR COND/i, "HEATING / AIR CONDITIONING"],
  [/RECALL/i, "RECALL"],
  [/NYSI|INSPECTION STICKER/i, "NYSI"],
];

let videoStream;
const video = document.getElementById('cam');
const canvas = document.getElementById('canvas');
const statusEl = document.getElementById('status');
const captureBtn = document.getElementById('capture');

document.getElementById('startCam').onclick = async () => {
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    video.srcObject = videoStream;
    captureBtn.disabled = false;
    statusEl.textContent = "Camera ready. Frame the form and capture.";
  } catch (err) {
    statusEl.textContent = "Camera error: " + err.message;
  }
};

captureBtn.onclick = async () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());
  await runOcr(canvas);
};

const uploadBtn = document.getElementById('uploadBtn');
const fileInput = document.getElementById('fileInput');

uploadBtn.onclick = () => fileInput.click();

fileInput.onchange = async () => {
  const file = fileInput.files[0];
  if (!file) return;

  const img = new Image();
  const url = URL.createObjectURL(file);
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
    img.src = url;
  });

  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  canvas.getContext('2d').drawImage(img, 0, 0);
  URL.revokeObjectURL(url);

  if (videoStream) videoStream.getTracks().forEach(t => t.stop());
  await runOcr(canvas);
  fileInput.value = '';
};

// Preprocess for OCR: upscale small images, convert to grayscale, and
// binarize with Otsu's method so Tesseract sees clean black-on-white text.
// Returns a new canvas (the source is left untouched).
function preprocess(source) {
  // Upscale so the long edge is at least ~2200px — Tesseract reads small
  // print much better when characters span more pixels. Never downscale.
  const longEdge = Math.max(source.width, source.height);
  const scale = longEdge < 2200 ? 2200 / longEdge : 1;

  const out = document.createElement('canvas');
  out.width = Math.round(source.width * scale);
  out.height = Math.round(source.height * scale);
  const ctx = out.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(source, 0, 0, out.width, out.height);

  const img = ctx.getImageData(0, 0, out.width, out.height);
  const px = img.data;

  // Grayscale (luminance) + build a histogram for Otsu thresholding.
  const hist = new Array(256).fill(0);
  for (let i = 0; i < px.length; i += 4) {
    const g = (px[i] * 0.299 + px[i + 1] * 0.587 + px[i + 2] * 0.114) | 0;
    px[i] = px[i + 1] = px[i + 2] = g;
    hist[g]++;
  }

  // Otsu's method: pick the threshold that maximizes between-class variance.
  const total = (out.width * out.height);
  let sum = 0;
  for (let t = 0; t < 256; t++) sum += t * hist[t];
  let sumB = 0, wB = 0, maxVar = -1, threshold = 127;
  for (let t = 0; t < 256; t++) {
    wB += hist[t];
    if (wB === 0) continue;
    const wF = total - wB;
    if (wF === 0) break;
    sumB += t * hist[t];
    const mB = sumB / wB;
    const mF = (sum - sumB) / wF;
    const between = wB * wF * (mB - mF) * (mB - mF);
    if (between > maxVar) { maxVar = between; threshold = t; }
  }

  // Binarize.
  for (let i = 0; i < px.length; i += 4) {
    const v = px[i] > threshold ? 255 : 0;
    px[i] = px[i + 1] = px[i + 2] = v;
  }
  ctx.putImageData(img, 0, 0);

  console.log(`Preprocess: ${source.width}x${source.height} -> ${out.width}x${out.height} (scale ${scale.toFixed(2)}), Otsu threshold ${threshold}`);
  return out;
}

// Fixed-template regions to OCR individually, as fractions of the page
// (x, y, w, h). Because this dealership's RO layout is fixed, cropping a
// known zone and OCRing just that — with a tight character whitelist —
// is far more reliable than hunting for the value in the full-page text.
// NOTE: this assumes the page roughly fills the frame upright (as in a flat
// scan). For badly cropped/rotated photos the full-page heuristics still run
// as a fallback, so a wrong region crop degrades gracefully rather than
// breaking. Add more entries here to pin down other fixed fields.
const REGIONS = {
  ro: {
    label: "RO #",
    rect: { x: 0.72, y: 0.0, w: 0.23, h: 0.09 }, // top-right corner
    whitelist: "0123456789",
    psm: "7", // single text line
    parse: t => (t.match(/\d{6}/) || [""])[0],
    target: "f_ro",
  },
};

let ocrWorker = null;
async function getWorker() {
  if (!ocrWorker) {
    ocrWorker = await Tesseract.createWorker('eng', undefined, {
      logger: m => {
        if (m.status === 'recognizing text') {
          statusEl.textContent = `OCR: ${(m.progress * 100).toFixed(0)}%`;
        }
      }
    });
  }
  return ocrWorker;
}

function cropRegion(canvas, rect) {
  const sx = Math.round(canvas.width * rect.x);
  const sy = Math.round(canvas.height * rect.y);
  const sw = Math.round(canvas.width * rect.w);
  const sh = Math.round(canvas.height * rect.h);
  const c = document.createElement('canvas');
  c.width = sw;
  c.height = sh;
  c.getContext('2d').drawImage(canvas, sx, sy, sw, sh, 0, 0, sw, sh);
  return c;
}

async function runRegionOcr(worker, prepped) {
  console.group("Region OCR");
  for (const key of Object.keys(REGIONS)) {
    const region = REGIONS[key];
    try {
      const crop = cropRegion(prepped, region.rect);
      await worker.setParameters({
        tessedit_char_whitelist: region.whitelist || '',
        tessedit_pageseg_mode: region.psm || '3',
      });
      const { data } = await worker.recognize(crop);
      const raw = (data.text || '').trim();
      const value = region.parse ? region.parse(raw) : raw;
      console.log(`${region.label}: parsed "${value}" from region text "${raw}" (conf ${data.confidence})`);
      if (value) {
        const el = document.getElementById(region.target);
        if (el) el.value = value;
      } else {
        console.log(`${region.label}: region OCR empty — keeping full-page heuristic result`);
      }
    } catch (err) {
      console.log(`${region.label}: region OCR failed (${err.message}) — keeping full-page result`);
    }
  }
  console.groupEnd();
}

async function runOcr(source) {
  captureBtn.disabled = true;
  uploadBtn.disabled = true;
  statusEl.textContent = "Preparing image...";

  try {
    const prepped = preprocess(source);
    const worker = await getWorker();

    // Pass 1: full page (auto layout, no whitelist) — drives Type of Work,
    // Name, Tag, and serves as the fallback for RO #.
    statusEl.textContent = "Running OCR... this can take 10-30s";
    await worker.setParameters({
      tessedit_char_whitelist: '',
      tessedit_pageseg_mode: '3', // fully automatic page segmentation
    });
    const { data } = await worker.recognize(prepped);
    logOcrDebug(data, prepped.width, prepped.height);
    populateForm(data, prepped.width, prepped.height);

    // Pass 2: targeted region OCR for fixed-position fields (overrides the
    // full-page guess when it produces a clean value).
    statusEl.textContent = "Reading fixed fields...";
    await runRegionOcr(worker, prepped);

    statusEl.textContent = "Done. Review the fields below before opening the form.";
    document.getElementById('reviewForm').style.display = 'block';
  } catch (err) {
    statusEl.textContent = "OCR error: " + err.message;
  } finally {
    captureBtn.disabled = false;
    uploadBtn.disabled = false;
  }
}

function logOcrDebug(data, imageWidth, imageHeight) {
  const words = (data.words || []).filter(w => w.text && w.text.trim().length);
  console.group(`OCR result (image ${imageWidth}x${imageHeight}, ${words.length} words, ${(data.confidence ?? 0).toFixed?.(1) ?? data.confidence}% avg confidence)`);
  console.log("Raw text:\n" + data.text);
  console.table(words.map(w => ({
    text: w.text,
    confidence: w.confidence,
    x0: w.bbox.x0, y0: w.bbox.y0, x1: w.bbox.x1, y1: w.bbox.y1
  })));
  console.groupEnd();
}

function populateForm(data, imageWidth, imageHeight) {
  const words = (data.words || []).filter(w => w.text && w.text.trim().length);
  const text = data.text || "";

  console.group("Field extraction");

  // Advisor #: exact match against the known dropdown list.
  // Uses the raw token (not digit-stripped) so dates like 11/18/25 can't
  // collapse into a number that happens to match an advisor ID.
  let advisor = "";
  const advisorCandidates = words.filter(w => /^\d+$/.test(w.text.trim()) && ADVISORS.includes(w.text.trim()));
  if (advisorCandidates.length) advisor = advisorCandidates[0].text.trim();
  console.log("Advisor #:", advisor || "(none found)", "| candidates:", advisorCandidates.map(w => w.text));
  document.getElementById('f_advisor').value = advisor;

  // RO #: a pure 6-digit token (no slashes/colons, so dates like 11/18/25
  // can't be mistaken for it) located in the top-right corner of the page,
  // where this dealership prints the RO number. Falls back to whichever
  // pure 6-digit token repeats most often (header/barcode/footer).
  const sixDigitWords = words.filter(w => /^\d{6}$/.test(w.text.trim()));
  const topRight = sixDigitWords.filter(w =>
    w.bbox.x0 > imageWidth * 0.55 && w.bbox.y1 < imageHeight * 0.25
  );
  let ro = "";
  if (topRight.length) {
    ro = topRight[0].text.trim();
    console.log("RO #:", ro, "| top-right candidates:", topRight.map(w => ({ text: w.text, bbox: w.bbox })));
  } else {
    const freq = {};
    for (const w of sixDigitWords) freq[w.text] = (freq[w.text] || 0) + 1;
    let max = 0;
    for (const [k, v] of Object.entries(freq)) {
      if (v > max) { max = v; ro = k; }
    }
    console.log("RO #:", ro || "(none found)", "| no top-right match, frequency table:", freq, "| all 6-digit tokens:", sixDigitWords.map(w => ({ text: w.text, bbox: w.bbox })));
  }
  document.getElementById('f_ro').value = ro;

  // Tag #: nearest purely-numeric word to the right of a "TAG" label, same
  // row band. Requiring digits-only skips the label text itself ("TAG NO.")
  // — e.g. the "NO" of "NO." is not numeric, so it can't be mistaken for a
  // tag value. The tag value, when present, is a number.
  let tag = "";
  const tagIdx = words.findIndex(w => /TAG/i.test(w.text));
  if (tagIdx >= 0) {
    const label = words[tagIdx];
    const candidates = words.filter((w, i) =>
      i > tagIdx &&
      Math.abs(w.bbox.y0 - label.bbox.y0) < 20 &&
      /\d/.test(w.text) // must contain a digit
    );
    // Use the digits of the first numeric candidate.
    for (const w of candidates) {
      const digits = w.text.replace(/\D/g, '');
      if (digits) { tag = digits; break; }
    }
    console.log("Tag #:", tag || "(none found)", "| label word:", label.text, "| numeric row candidates:", candidates.map(w => w.text));
  } else {
    console.log("Tag #: (no 'TAG' label found in OCR output)");
  }
  document.getElementById('f_tag').value = tag;

  // Customer name: all-caps word run just below a VIN-like 17-char token
  let name = "";
  const vinIdx = words.findIndex(w => /^[A-HJ-NPR-Z0-9]{17}$/.test(w.text.toUpperCase()));
  if (vinIdx >= 0) {
    const vin = words[vinIdx];
    const nameWords = words.filter(w =>
      w.bbox.y0 > vin.bbox.y1 &&
      w.bbox.y0 < vin.bbox.y1 + 40 &&
      /^[A-Z]+$/.test(w.text)
    );
    name = nameWords.map(w => w.text).join(' ');
    console.log("Customer Name:", name || "(none found)", "| VIN token:", vin.text, "| name candidates:", nameWords.map(w => w.text));
  } else {
    console.log("Customer Name: (no VIN-like 17-char token found)");
  }
  document.getElementById('f_name').value = name;

  // Type of work: keyword scan over the job description text
  const typeMatches = [];
  for (const [regex, category] of KEYWORD_MAP) {
    if (regex.test(text)) {
      typeMatches.push(category);
      const cb = document.querySelector(`input[name="type"][value="${category}"]`);
      if (cb) cb.checked = true;
    }
  }
  console.log("Type of Work matches:", typeMatches.length ? typeMatches : "(none)");

  console.groupEnd();
}

document.getElementById('genLink').onclick = () => {
  const base = "https://docs.google.com/forms/d/e/1FAIpQLScLJnRO7EemJcZTy9gP_iYE9FvcRBelDArE9dHf0evu6ZKARQ/viewform";
  const params = new URLSearchParams();
  params.set('usp', 'pp_url');
  params.append('entry.1742178377', document.getElementById('f_name').value);
  params.append('entry.438656768', document.getElementById('f_ro').value);
  params.append('entry.1130646650', document.getElementById('f_advisor').value);
  params.append('entry.22122272', document.getElementById('f_tag').value);

  const status = document.querySelector('input[name="status"]:checked');
  if (status) params.append('entry.1856597312', status.value);

  const shop = document.querySelector('input[name="shop"]:checked');
  if (shop) params.append('entry.707168016', shop.value);

  document.querySelectorAll('input[name="type"]:checked').forEach(cb =>
    params.append('entry.454520462', cb.value)
  );

  params.append('entry.760985235', document.getElementById('f_notes').value);

  const url = `${base}?${params.toString()}`;
  const link = document.getElementById('formLink');
  link.href = url;
  link.style.display = 'block';
  link.textContent = "Tap to open the pre-filled form";
};
</script>
</body>
</html>
